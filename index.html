function confirmUseExp() {
  const inputs = modalBody.querySelectorAll('input[type="number"]');
  let totalGain = 0;
  let totalUsed = 0;
  let rootItemCount = 0;
  const inv = gameState.inventory;
  inputs.forEach(input => {
    const qty = Math.max(0, parseInt(input.value || '0', 10));
    if (!qty) return;
    const name = input.id.replace('useexp-', '');
    const eff = ITEM_EFFECTS[name] || {};
    // 若為靈根重塑丹，單獨處理：扣除道具數量並累計次數，但不增加經驗
    if (eff && eff.change_root) {
      const cur = inv[name] || 0;
      inv[name] = Math.max(0, cur - qty);
      rootItemCount += qty;
      return;
    }
    // 一般仙丹道具：計算經驗增量
    const add = (eff.n || 0) * qty;
    const cur = inv[name] || 0;
    inv[name] = Math.max(0, cur - qty);
    totalGain += add;
    totalUsed += qty;
  });
  // 若有使用靈根重塑丹：先處理經驗增加（若有），然後啟動靈根重測
  if (rootItemCount > 0) {
    // 更新經驗值
    if (totalGain > 0) {
      const prevExp = gameState.exp;
      gameState.exp += totalGain;
      saveGameState();
      handleLevelUp(prevExp, gameState.exp);
      // 更新天命挑戰 - 仙丹類任務進度（只計算一般仙丹使用次數）
      try {
        if (typeof updateHeavenChallengeProgressItemUse === 'function' && totalUsed > 0) {
          updateHeavenChallengeProgressItemUse('elixir', totalUsed);
        }
      } catch (e) { /* ignore */ }
    }
    // 開始靈根重測：進入靈根測試流程
    try {
      startTraining(1);
      if (trainingState) {
        trainingState.isLinggenTest = true;
        trainingState.isRetestLinggen = true;
        trainingState.linggenLevel = 1;
        trainingState.totalRounds = 1;
      }
    } catch (e) { console.warn('重新測試靈根失敗', e); }
    // 關閉當前對話框
    modal.style.display = 'none';
    return;
  }
  // 無使用靈根重塑丹，僅處理經驗增加
  if (totalGain > 0) {
    const prevExp = gameState.exp;
    gameState.exp += totalGain;
    saveGameState();
    const levelupMsg = handleLevelUp(prevExp, gameState.exp);
    showModal("🍵 使用結果",
      `<p>共獲得 +${totalGain} EXP</p>${levelupMsg ? `<p class="msg-levelup">${levelupMsg}</p>` : ''}`,
      `<button data-action="close-modal">關閉</button>`);
    // 更新天命挑戰 - 仙丹類道具使用
    try {
      if (typeof updateHeavenChallengeProgressItemUse === 'function' && totalUsed > 0) {
        updateHeavenChallengeProgressItemUse('elixir', totalUsed);
      }
    } catch (e) { /* ignore */ }
  } else {
    showModal("🍵 使用結果", "<p>未選擇任何仙丹。</p>", `<button data-action="close-modal">關閉</button>`);
  }
}

      try {
        if (typeof updateHeavenChallengeProgressItemUse === 'function' && totalUsed > 0) {
          updateHeavenChallengeProgressItemUse('elixir', totalUsed);
        }
      } catch (e) { /* ignore */ }
    }
    // 開始靈根重測
    try {
      startTraining(1);
      if (trainingState) {
        trainingState.isLinggenTest = true;
        trainingState.isRetestLinggen = true;
        trainingState.linggenLevel = 1;

  }

  if (totalGain > 0) {

    gameState.exp += totalGain;
    saveGameState();
    const levelupMsg = handleLevelUp(prevExp, gameState.exp);
    showModal("🍵 使用結果",

function confirmDeleteItems() {
  const inputs = modalBody.querySelectorAll('input[type="number"]');
  const inv = gameState.inventory;
  let removedList = [];
  inputs.forEach(input => {
    const qty = Math.max(0, parseInt(input.value || '0', 10));
    if (!qty) return;
    const name = input.id.replace('del-', '');
    const cur = inv[name] || 0;
    const rm = Math.min(qty, cur);
    if (rm > 0) {
      inv[name] = cur - rm;
      removedList.push(`${name} ×${rm}`);
    }
  });
  saveGameState();
  showModal("🗑️ 刪除結果",
    removedList.length ? `<p>已刪除：${removedList.join('、')}</p>` : "<p>未刪除任何道具</p>",
    `<button data-action="close-modal">關閉</button>`);
}

function showShop() {
    const sortedItems = Object.entries(ITEM_STONE_PRICES).sort(([a], [b]) => {
        const keyA = getItemSortKey(a);
        const keyB = getItemSortKey(b);
        if (keyA[0] !== keyB[0]) return keyA[0] - keyB[0];
        if (keyA[1] !== keyB[1]) return keyA[1] - keyB[1];
        return a.localeCompare(b, 'zh-Hant');
    });

    let content = `<p style="text-align:center;"><b>當前靈石：${gameState.stones}</b></p>`;
    content += sortedItems.map(([item, cost]) => {
        const desc = ITEM_EFFECTS[item]?.desc || '';
        // 計算分類與品階的 class
        const catCls = getItemCategoryClass(item);
        const gradeCls = getItemGradeClass(item);
        const labelHtml = `<span class="grade-${gradeCls}">${item}</span> - ${cost} 靈石 (${desc})`;
        return `<div class="modal-item-row cat-${catCls}">
            <label for="shop-${item}">${labelHtml}</label>
            <input type="number" id="shop-${item}" min="0" value="0" placeholder="0">
        </div>`;
    }).join('');

    let footer = `<button data-action="bulk-buy-items">購買選擇</button>
                  <button class="btn-warning" data-action="show-sell-dialog">販賣道具</button>
                  <button class="btn-secondary" data-action="show-upgrade-dialog">品階升級</button>`;
    
    showModal("🛒 商店", content, footer);
}

function bulkBuyItems() {
    const inputs = modalBody.querySelectorAll('input[type="number"]');
    let totalCost = 0;
    const purchase = {};

    inputs.forEach(input => {
        const qty = parseInt(input.value, 10);
        if (qty > 0) {
            const itemName = input.id.replace('shop-', '');
            const price = ITEM_STONE_PRICES[itemName] || 0;
            totalCost += price * qty;
            purchase[itemName] = qty;
        }
    });

    if (totalCost > gameState.stones) {
        alert(`靈石不足！需要 ${totalCost}，您只有 ${gameState.stones}。`);
        return;
    }

    if (Object.keys(purchase).length > 0) {
        gameState.stones -= totalCost;
        Object.entries(purchase).forEach(([item, qty]) => {
            gameState.inventory[item] = (gameState.inventory[item] || 0) + qty;
            if (!gameState.inventory_order.includes(item)) {
                gameState.inventory_order.push(item);
                 gameState.inventory_order.sort((a, b) => compareItemNames(a, b));
            }
        });
        saveGameState();
        addTemporaryMessage(`✅ 購買成功，花費 ${totalCost} 靈石！`, 'msg-shop');
    }
    modal.style.display = "none";
    renderMainMenu();
}

function showUpgradeDialog() {
    const upgradable = Object.keys(UPGRADE_PATHS)
        .filter(item => (gameState.inventory[item] || 0) > 0 && !(gameState.inventory[UPGRADE_PATHS[item]] > 0))
        // 依類型與品階排序
        .sort((a,b) => compareItemNames(a, b));

    let content = `<p style="text-align:center;"><b>當前靈石：${gameState.stones}</b></p>`;
    if (upgradable.length === 0) {
        content += `<p>沒有可升級的道具。</p>`;
    } else {
        content += upgradable.map(item => {
            const nextItem = UPGRADE_PATHS[item];
            const cost = ITEM_EFFECTS[item].upgrade_cost || 0;
            // 升級對話框：為當前道具列加入分類與品階樣式；分別對當前道具與下一道具加上品階顏色
            const catCls = getItemCategoryClass(item);
            const gradeClsCurrent = getItemGradeClass(item);
            const gradeClsNext = getItemGradeClass(nextItem);
            return `<div class="modal-item-row cat-${catCls}">
                <span>升級 <span class="grade-${gradeClsCurrent}">${item}</span> → <span class="grade-${gradeClsNext}">${nextItem}</span></span>
                <button data-action="upgrade-item" data-current="${item}" data-next="${nextItem}" data-cost="${cost}" ${gameState.stones < cost ? 'disabled' : ''}>${cost} 靈石</button>
            </div>`;
        }).join('');
    }
    showModal("✨ 品階升級", content, `<button data-action="show-shop">返回商店</button>`);
}

function upgradeItem(currentItem, nextItem, cost) {
    if (gameState.stones < cost) {
        alert("靈石不足！");
        return;
    }
    gameState.stones -= cost;
    gameState.inventory[nextItem] = (gameState.inventory[nextItem] || 0) + 1;
    // Don't remove old item
    if (!gameState.inventory_order.includes(nextItem)) {
        gameState.inventory_order.push(nextItem);
        gameState.inventory_order.sort((a,b) => compareItemNames(a,b));
    }
    saveGameState();
    // 扣靈石後立即更新主畫面資訊（尤其是靈石顯示）
    if (typeof updateMainMenuInfo === 'function') {
        updateMainMenuInfo();
    }
    alert(`升級成功！獲得 ${nextItem}`);
    showUpgradeDialog(); // Refresh modal
}

// ===================== 遊戲中道具使用 =====================

function showUseItemDialog() {
    // 取得所有可用的戰鬥道具（含兵器、功法、陣法、靈器、靈符）並依類型與品階排序
    const allUsableItems = Object.entries(gameState.inventory)
      .filter(([, qty]) => qty > 0)
      .map(([name]) => name)
      .filter(name => {
        const type = ITEM_EFFECTS[name]?.type;
        // 僅限正確答案、錯誤答案、多選、標記錯誤、增加時間類型
        return ["correct", "wrong", "multi_choice", "reveal_wrong", "add_time"].includes(type);
      })
      .sort((a, b) => compareItemNames(a, b));
    // 如果尚未設定過濾器，預設為快捷道具（若有設定）或兵器類
    if (!currentItemFilter) {
      if (Array.isArray(gameState.quickItems) && gameState.quickItems.length > 0) {
        currentItemFilter = 'quick';
      } else {
        currentItemFilter = 'weapon';
      }
    }
    // 道具分類列表
    const filterDefs = [
      { id: 'weapon', label: '兵器' },
      { id: 'technique', label: '功法' },
      { id: 'formation', label: '陣法' },
      { id: 'artifact', label: '靈器' },
      { id: 'charm', label: '靈符' },
      { id: 'quick', label: '快捷道具' }
    ];
    // 建立分類按鈕列
    const filterBar = filterDefs.map(f => {
      const isActive = (currentItemFilter === f.id);
      // 快捷道具若沒有內容則禁用
      const isDisabled = (f.id === 'quick' && (!Array.isArray(gameState.quickItems) || gameState.quickItems.length === 0));
      const activeCls = isActive ? 'active' : '';
      const disableAttr = isDisabled ? 'disabled' : '';
      return `<button data-action="switch-use-item-filter" data-filter="${f.id}" class="btn-filter ${activeCls}" ${disableAttr}>${f.label}</button>`;
    }).join('');
    // 根據當前選擇過濾項目
    let filteredItems;
    if (currentItemFilter === 'quick') {
      // 快捷道具：僅顯示玩家設定的快捷道具且存在於背包中
      filteredItems = allUsableItems.filter(name => Array.isArray(gameState.quickItems) && gameState.quickItems.includes(name));
    } else {
      filteredItems = allUsableItems.filter(name => getItemCategoryClass(name) === currentItemFilter);
    }
    let content = '';
    if (!filteredItems || filteredItems.length === 0) {
      content = '<p>沒有可用的戰鬥道具</p>';
    } else {
      content = filteredItems.map(item => {
        const eff = ITEM_EFFECTS[item];
        const cost = eff.exp_cost || 0;
        let disabled = '';
        let tooltip = '';
        // 根據消耗 EXP 判斷是否禁用
        if (gameState.exp < cost) {
          disabled = 'disabled';
          tooltip = ` (修煉經驗不足: ${cost})`;
        }
        // 單次道具使用限制
        if (['correct', 'wrong', 'multi_choice'].includes(eff.type) && trainingState.hasUsedSingleUseItem) {
          disabled = 'disabled';
          tooltip = ' (本題已用過此類道具)';
        }
        // 難度限制：正確與錯誤類道具需符合品階
        if (['correct', 'wrong'].includes(eff.type)) {
          const allowedGrade = getGradeByDifficulty(trainingState.difficulty);
          if (!item.startsWith(allowedGrade)) {
            disabled = 'disabled';
            tooltip = ` (此難度需用 ${allowedGrade} 道具)`;
          }
        }
        // 加入道具分類與品階樣式
        const catCls = getItemCategoryClass(item);
        const gradeCls = getItemGradeClass(item);
        return `<button data-action="use-item" data-item-name="${item}" class="cat-${catCls}" ${disabled}>
          <span class="grade-${gradeCls}">${item}</span> ×${gameState.inventory[item]}
          <br><small>${eff.desc || ''}${cost > 0 ? ` (消耗${cost} EXP)` : ''}${tooltip}</small>
        </button>`;
      }).join('');
    }
    // 組合分類按鈕列與內容
    const fullContent = `<div class="item-filter-bar" style="text-align:center; margin-bottom:8px;">${filterBar}</div>` + content;
    showModal('🎒 使用道具', fullContent);
}

function useItem(itemName) {
    const eff  = ITEM_EFFECTS[itemName];
    if (!eff) return;
    const cost = eff.exp_cost || 0;
    if (gameState.exp < cost) return;
    if (['correct', 'wrong', 'multi_choice'].includes(eff.type)) {
      if (trainingState.hasUsedSingleUseItem) return;
      trainingState.hasUsedSingleUseItem = true;
    }
    gameState.exp -= cost;
    if (['correct', 'wrong'].includes(eff.type)) {
      gameState.inventory[itemName] = Math.max(0, (gameState.inventory[itemName] || 0) - 1);
    }
    saveGameState();
    // # 線上版新增：記錄本局使用過的道具名稱（去重由前端/雲端自行處理）
    try {
        if (typeof trainingState !== 'undefined') {
            trainingState.usedItems = trainingState.usedItems || [];
            if (!trainingState.usedItems.includes(itemName)) {
                trainingState.usedItems.push(itemName);
            }
        }
    } catch (e) { /* # ignore */ }

    const fb = document.getElementById('feedback-label');
    let msg = '';
    if (eff.type === 'multi_choice') {
      trainingState.allowedChoices += (eff.n || 1);
      enterMultiChoiceMode();
      msg = `⚔️ 兵器效果：本題可選答案數增加 ${eff.n}（總共 ${trainingState.allowedChoices} 次）`;
    } else if (eff.type === 'reveal_wrong') {
      const buttons = trainingState.gameGridButtons || [];
      // 取得所有尚未標示且為錯誤的按鈕
      const wrongButtons = buttons.filter(b => !trainingState.correctAnswers.includes(b.dataset.choice) && !b.classList.contains('hint-wrong'));
      // 隨機打亂順序，避免固定順序顯示錯誤選項
      const shuffled = wrongButtons.sort(() => Math.random() - 0.5);
      const nReveal = eff.n || 1;
      const toReveal = shuffled.slice(0, nReveal);
      toReveal.forEach(b => b.classList.add('hint-wrong'));
      msg = `📜 功法效果：已標示 ${toReveal.length} 個錯誤答案`;
    } else if (eff.type === 'add_time') {

      trainingState.roundExtraTime = (trainingState.roundExtraTime || 0) + inc;
      // 若倒數正在跑，立即增加剩餘秒數
      if (typeof trainingState.countdownRemaining === 'number') {
        trainingState.countdownRemaining += inc;
        const label = document.getElementById('countdown-label');
        if (label && trainingState.countdownRemaining >= 0) {
          label.textContent = `作答倒數：${trainingState.countdownRemaining} 秒`;
        }
      }
      msg = `⛩️ 陣法效果：作答時間增加 ${inc} 秒（僅本題）`;
    } else if (eff.type === 'correct') {
// 靈器：顯示正確答案。n <= 0 視為全部，否則顯示 n 個
const buttons = trainingState.gameGridButtons || [];
// 找出所有尚未標示的正確按鈕
const correctButtons = buttons.filter(b =>
  trainingState.correctAnswers.includes(b.dataset.choice) && !b.classList.contains('hint-correct')
);
let toReveal;
if (eff.n <= 0) {
  // n <= 0 表示全部亮顯
  toReveal = correctButtons;
} else {
  // 否則只顯示前 n 個
  toReveal = correctButtons.slice(0, eff.n);
}
// 將選中的按鈕標記為正確
toReveal.forEach(b => b.classList.add('hint-correct'));
msg = `🪬 靈器效果：已標示 ${eff.n <= 0 ? '全部' : toReveal.length} 個正確答案`;
    } else if (eff.type === 'wrong') {
      const buttons = trainingState.gameGridButtons || [];
      // 取得所有尚未標示的錯誤按鈕
      const wrongButtons = buttons.filter(b => !trainingState.correctAnswers.includes(b.dataset.choice) && !b.classList.contains('hint-wrong'));
      // 隨機打亂順序，以避免固定順序顯示錯誤選項
      const shuffled = wrongButtons.sort(() => Math.random() - 0.5);
      const nReveal = eff.n || 1;
      const toReveal = shuffled.slice(0, nReveal);
      toReveal.forEach(b => b.classList.add('hint-wrong'));
      msg = `🧿 靈符效果：已排除 ${toReveal.length} 個錯誤答案`;
    }
    // === 更新天命挑戰的道具使用進度 ===
    try {
        if (typeof updateHeavenChallengeProgressItemUse === 'function') {
            let typeMapping = null;
            switch (eff.type) {
                case 'multi_choice':
                    typeMapping = 'weapon';
                    break;
                case 'reveal_wrong':
                    typeMapping = 'technique';
                    break;
                case 'add_time':
                    typeMapping = 'formation';
                    break;
                case 'correct':
                    typeMapping = 'artifact';
                    break;
                case 'wrong':
                    typeMapping = 'charm';
                    break;
                // EXP 類代表仙丹，對應 elixir 任務
                case 'exp':
                    typeMapping = 'elixir';
                    break;
                default:
                    typeMapping = null;
            }
            if (typeMapping) {
                updateHeavenChallengeProgressItemUse(typeMapping, 1);
            }
        }
    } catch (e) { /* ignore */ }
    if (fb) { fb.textContent = msg; fb.className = "feedback info"; }

}

// 取得亞洲台北時區的今日日期字串（格式：YYYY-MM-DD）
function getTodayDateStr() {
    try {
        const now = new Date();
        const tzDate = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
        const y = tzDate.getFullYear();
        const m = String(tzDate.getMonth() + 1).padStart(2, '0');
        const d = String(tzDate.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    } catch (e) {
        // fallback: 使用本地時間
        return new Date().toISOString().slice(0, 10);
    }
}

// 初始化每日任務：若當天尚未生成任務或任務日期已過，從模板中隨機挑選一個任務
function initDailyTask() {
    const todayStr = getTodayDateStr();
    if (!gameState.dailyTask || gameState.dailyTask.date !== todayStr) {
        // 從任務模板中隨機選擇一項
        const tpl = DAILY_TASK_TEMPLATES[Math.floor(Math.random() * DAILY_TASK_TEMPLATES.length)];
        gameState.dailyTask = {
            date: todayStr,
            type: tpl.type,
            difficulty: tpl.difficulty,
            target: tpl.target,
            progress: 0,
            accepted: false,
            completed: false,
            claimed: false
        };
        // 重置連續任務接受狀態
        saveGameState();
    }
}

// 處理每日簽到：檢查是否已簽到，並發放獎勵
function handleDailySignIn() {
    const todayStr = getTodayDateStr();
    // 若今日已簽到
    if (gameState.signInLastDate === todayStr) {
        showModal('📅 每日簽到', '<p>你今天已經簽到，明天再來吧！</p>', '<button data-action="close-modal">關閉</button>');
        return;
    }
    // 計算連續簽到天數：若前一簽到日期是昨天，則連續天數+1；否則重置為1
    const yesterday = new Date(new Date(todayStr).getTime() - 86400000);
    const yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth() + 1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
    let streak = 1;
    if (gameState.signInLastDate === yStr) {
        streak = (gameState.signInStreak || 0) + 1;
    }
    gameState.signInStreak = streak;
    gameState.signInLastDate = todayStr;
    // 紀錄簽到日期到簽到歷史中
    if (!Array.isArray(gameState.signInHistory)) {
        gameState.signInHistory = [];
    }
    if (!gameState.signInHistory.includes(todayStr)) {
        gameState.signInHistory.push(todayStr);
    }
    // 根據修為階層計算基礎獎勵：階層越高基礎值越大
    const stageIdx = getStageIndex(gameState.exp);
    let baseExp = 50 * (stageIdx + 1);
    // 簽到連續天數越多，獎勵倍率越高
    const expReward = Math.floor(baseExp * (1 + 0.1 * streak) + Math.random() * baseExp * 0.5);
    const stonesReward = 2 + Math.floor(streak / 2);
    gameState.exp += expReward;
    gameState.stones += stonesReward;
    saveGameState();
    // 訊息內容
    const msg = `<p>✅ 簽到成功！已連續簽到 ${streak} 天。</p><p>獲得 ${expReward} 修煉經驗與 ${stonesReward} 靈石！</p>`;
    showModal('📅 簽到獎勵', msg, '<button data-action="close-modal">關閉</button>');
    // 更新主畫面資訊
    if (typeof updateMainMenuInfo === 'function') {
        try { updateMainMenuInfo(); } catch (e) {}
    }
}

// 領取每日任務獎勵
function claimDailyTaskReward() {
    initDailyTask();
    const task = gameState.dailyTask;
    if (!task || !task.completed) {
        showModal('🗒️ 任務獎勵', '<p>任務尚未完成，無法領取獎勵。</p>', '<button data-action="close-modal">關閉</button>');

        return;
    }
    // 根據任務難度與目標給予獎勵：難度越高與目標次數越多獎勵越大
    const baseExp = 200 * task.difficulty * task.target;
    const randExp = Math.floor(Math.random() * baseExp * 2);
    const expReward = baseExp + randExp;
    const stonesReward = 50 * task.difficulty;
    gameState.exp += expReward;
    gameState.stones += stonesReward;
    task.claimed = true;
    saveGameState();
    const msg = `<p>🎁 任務完成！獲得 ${expReward} EXP 與 ${stonesReward} 靈石。</p>`;
    showModal('🗒️ 任務獎勵', msg, '<button data-action="close-modal">關閉</button>');
    if (typeof updateMainMenuInfo === 'function') {
        try { updateMainMenuInfo(); } catch (e) {}
    }
}

// 更新每日任務進度（普通訓練）：isPass 為是否達到該難度勝率門檻
function updateDailyTaskProgressTraining(isPass, difficulty) {
    const task = gameState.dailyTask;
    if (!task || !task.accepted || task.completed) return;
    if (task.type !== 'training') return;
    if (task.difficulty !== difficulty) return;
    if (!isPass) return;
    task.progress = (task.progress || 0) + 1;
    if (task.progress >= task.target) {
        task.completed = true;
    }
    saveGameState();
}

// 更新每日任務進度（秘境試煉）：根據答對題數判斷是否達標
function updateDailyTaskProgressTrial(correctCount, difficulty) {
    const task = gameState.dailyTask;
    if (!task || !task.accepted || task.completed) return;
    if (task.type !== 'secretTrial') return;
    if (task.difficulty !== difficulty) return;
    const threshold = TRIAL_TRAINING_REQUIREMENTS[difficulty] !== undefined ? TRIAL_TRAINING_REQUIREMENTS[difficulty] : 1;
    if (correctCount < threshold) return;
    task.progress = (task.progress || 0) + 1;
    if (task.progress >= task.target) {
        task.completed = true;
    }
    saveGameState();
}

        }

// 產生隨機的天命挑戰任務列表
// 取得天命挑戰獎勵倍數：依據任務期限天數，回傳對應倍率。
function getHeavenRewardMultiplier(durationDays) {
    // 採用等比級數：期限越長，倍率越高。自訂常數：0 天 = 100, 1 天 = 200, 3 天 = 400, 5 天 = 800
    switch (durationDays) {
        case 1: return 200;
        case 3: return 400;
        case 5: return 800;
        default: return 100;
    }
}

// 隨機產生單一天命挑戰任務
function generateHeavenTask(type) {
    // 輔助亂數函式
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    // 隨機期限：0、1、3、5 天
    const durations = [0, 1, 3, 5];
    const durationDays = durations[randInt(0, durations.length - 1)];
    const now = Date.now();
    const expireAt = durationDays > 0 ? now + durationDays * 24 * 60 * 60 * 1000 : null;
    const multiplier = getHeavenRewardMultiplier(durationDays);
    // 根據類型產生不同任務
    if (type === 'training') {
        // 可選子類：sessions、correct、streak
        const subTypes = ['sessions', 'correct', 'streak'];
        const subType = subTypes[randInt(0, subTypes.length - 1)];
        const difficulty = randInt(1, 5);
        if (subType === 'sessions') {
            const targetSessions = [5, 10, 15, 20][randInt(0, 3)];
            const winRate = [50, 60, 70][randInt(0, 2)];
            const baseExp = targetSessions * difficulty;
            const baseStones = Math.max(1, Math.floor(targetSessions / 5));
            return {
                id: 'training_sessions_' + Date.now() + '_' + Math.random(),
                type: 'training', subType: 'sessions', difficulty: difficulty,
                targetSessions: targetSessions, winRate: winRate,
                progress: { sessions: 0 }, accepted: false, completed: false, claimed: false,
                reward: { exp: Math.floor(baseExp * multiplier), stones: Math.floor(baseStones * multiplier) },
                description: `完成普通訓練難度 ${difficulty} ${targetSessions} 次並達到勝率 ${winRate}% 以上`,
                durationDays: durationDays, expireAt: expireAt, cooldownUntil: null
            };
        } else if (subType === 'correct') {
            const targetCorrect = [20, 30, 40, 50][randInt(0, 3)];
            const baseExp = targetCorrect; // 每題對應 1 經驗
            const baseStones = Math.max(1, Math.floor(targetCorrect / 10));
            return {
                id: 'training_correct_' + Date.now() + '_' + Math.random(),
                type: 'training', subType: 'correct', difficulty: difficulty,
                targetCorrect: targetCorrect,
                progress: { correct: 0 }, accepted: false, completed: false, claimed: false,
                reward: { exp: Math.floor(baseExp * multiplier), stones: Math.floor(baseStones * multiplier) },
                description: `於普通訓練難度 ${difficulty} 累積正確回答 ${targetCorrect} 題`,
                durationDays: durationDays, expireAt: expireAt, cooldownUntil: null
            };
        } else {
            // streak 任務
            const targetStreak = [5, 7, 10][randInt(0, 2)];
            const winRate = [50, 60, 70][randInt(0, 2)];
            const baseExp = targetStreak * difficulty * 2;
            const baseStones = Math.max(1, Math.floor(targetStreak / 2));
            return {
                id: 'training_streak_' + Date.now() + '_' + Math.random(),
                type: 'training', subType: 'streak', difficulty: difficulty,
                targetStreak: targetStreak, winRate: winRate,
                progress: { streak: 0 }, accepted: false, completed: false, claimed: false,
                reward: { exp: Math.floor(baseExp * multiplier), stones: Math.floor(baseStones * multiplier) },
                description: `連續成功完成難度 ${difficulty} 訓練 ${targetStreak} 次並達到勝率 ${winRate}% 以上`,
                durationDays: durationDays, expireAt: expireAt, cooldownUntil: null
            };
        }
    } else if (type === 'trial') {
        const difficulty = randInt(1, 5);
        const targetSessions = [2, 3, 4, 5][randInt(0, 3)];
        // 使用全局秘境訓練閾值表以決定每次至少答對幾題
        const threshold = (TRIAL_TRAINING_REQUIREMENTS && TRIAL_TRAINING_REQUIREMENTS[difficulty] !== undefined) ? TRIAL_TRAINING_REQUIREMENTS[difficulty] : 1;
        const baseExp = targetSessions * (difficulty + 1);
        const baseStones = Math.max(1, targetSessions);
        return {
            id: 'trial_sessions_' + Date.now() + '_' + Math.random(),
            type: 'trial', subType: 'sessions', difficulty: difficulty,
            targetSessions: targetSessions, correctThreshold: threshold,
            progress: { sessions: 0 }, accepted: false, completed: false, claimed: false,
            reward: { exp: Math.floor(baseExp * multiplier), stones: Math.floor(baseStones * multiplier) },
            description: `挑戰秘境試煉難度 ${difficulty} 並至少答對 ${threshold} 題 ${targetSessions} 次`,
            durationDays: durationDays, expireAt: expireAt, cooldownUntil: null
        };
    } else if (type === 'item') {
        // 可使用的道具類型列表
        const itemTypes = ['weapon', 'charm', 'technique', 'formation', 'artifact', 'elixir'];
        const itemType = itemTypes[randInt(0, itemTypes.length - 1)];
        const labelMap = {
            weapon: '兵器類道具', charm: '靈符類道具',
            technique: '功法類道具', formation: '陣法類道具',
            artifact: '靈器類道具', elixir: '仙丹類道具'
        };
        const targetUses = [3, 5, 8, 10, 15][randInt(0, 4)];
        const baseExp = targetUses * 2;
        const baseStones = Math.max(1, Math.floor(targetUses / 2));
        return {
            id: 'item_usage_' + itemType + '_' + Date.now() + '_' + Math.random(),
            type: 'item', itemType: itemType,
            targetItemUse: targetUses,
            progress: { uses: 0 }, accepted: false, completed: false, claimed: false,
            reward: { exp: Math.floor(baseExp * multiplier), stones: Math.floor(baseStones * multiplier) },
            description: `在任務期間內使用 ${labelMap[itemType]} ${targetUses} 次`,
            durationDays: durationDays, expireAt: expireAt, cooldownUntil: null
        };
    } else if (type === 'achievement') {
        // 可選子類：exp 或 streak
        const subTypes = ['exp', 'streak'];
        const subType = subTypes[randInt(0, subTypes.length - 1)];
        if (subType === 'exp') {
            const targetExp = [3000, 5000, 7000, 10000][randInt(0, 3)];
            const baseStones = Math.max(1, Math.floor(targetExp / 1000));
            return {
                id: 'achievement_exp_' + Date.now() + '_' + Math.random(),
                type: 'achievement', subType: 'exp',
                targetExp: targetExp,
                progress: { exp: 0 }, accepted: false, completed: false, claimed: false,
                reward: { exp: 0, stones: Math.floor(baseStones * multiplier) },
                description: `累積獲得 ${targetExp} 修煉經驗`,
                durationDays: durationDays, expireAt: expireAt, cooldownUntil: null
            };
        } else {
            // achievement streak 任務
            const difficulty = randInt(1, 5);
            const targetStreak = [5, 7, 10][randInt(0, 2)];
            const winRate = [50, 60, 70][randInt(0, 2)];
            const baseExp = targetStreak * difficulty * 2;
            const baseStones = Math.max(1, Math.floor(targetStreak / 2));
            return {
                id: 'achievement_streak_' + Date.now() + '_' + Math.random(),
                type: 'achievement', subType: 'streak', difficulty: difficulty,
                targetStreak: targetStreak, winRate: winRate,
                progress: { streak: 0 }, accepted: false, completed: false, claimed: false,
                reward: { exp: Math.floor(baseExp * multiplier), stones: Math.floor(baseStones * multiplier) },
                description: `連續成功完成難度 ${difficulty} 訓練 ${targetStreak} 次並達到勝率 ${winRate}% 以上`,
                durationDays: durationDays, expireAt: expireAt, cooldownUntil: null
            };
        }
    }
    // 預設傳回空任務（不應發生）
    return {
        id: 'invalid_' + Date.now() + '_' + Math.random(), type: type, subType: '',
        progress: {}, accepted: false, completed: false, claimed: false,
        reward: { exp: 0, stones: 0 }, description: '無效任務', durationDays: 0, expireAt: null, cooldownUntil: null
    };
}

// 產生隨機的天命挑戰任務列表（每種類型各 10 項）
function generateRandomHeavenTasks() {
    const tasks = [];
    const types = ['training', 'trial', 'item', 'achievement'];
    types.forEach((t) => {
        for (let i = 0; i < 10; i++) {
            tasks.push(generateHeavenTask(t));
        }
    });
    return tasks;
}

// 清理天命挑戰任務：
// - 移除或替換已過期任務
// - 處理冷卻任務：若冷卻時間已到，產生新的任務
// - 確保每種類型均維持 10 個任務
function cleanupHeavenChallenges() {
    try {
        const now = Date.now();
        if (!Array.isArray(gameState.heavenChallenges)) {
            gameState.heavenChallenges = [];
        }
        // 處理每個任務
        for (let i = 0; i < gameState.heavenChallenges.length; i++) {
            const task = gameState.heavenChallenges[i];
            // 冷卻結束：替換為新任務（保持原類型）
            if (task && task.cooldownUntil && now >= task.cooldownUntil) {
                gameState.heavenChallenges[i] = generateHeavenTask(task.type);
            }
            // 過期任務：若設有期限且已過期，且尚未領獎，則直接替換為新任務
            const expired = task && task.expireAt && now >= task.expireAt;
            if (task && expired) {
                gameState.heavenChallenges[i] = generateHeavenTask(task.type);
            }
        }
        // 確保每類型任務至少 10 個
        const counts = { training: 0, trial: 0, item: 0, achievement: 0 };
        gameState.heavenChallenges.forEach((t) => {
            if (t && t.type && counts.hasOwnProperty(t.type)) counts[t.type]++;
        });
        ['training','trial','item','achievement'].forEach((tp) => {
            while (counts[tp] < 10) {
                gameState.heavenChallenges.push(generateHeavenTask(tp));
                counts[tp]++;
            }
        });
        // 若有多餘任務，也不做移除，只維持生成。可依需要裁剪。
        saveGameState();
    } catch (e) {
        console.warn('清理天命挑戰任務失敗', e);
    }
}

// 替換單一天命挑戰任務為新任務（保持原類型）
function replaceHeavenTask(index) {
    try {
        const tasks = gameState.heavenChallenges || [];
        if (index < 0 || index >= tasks.length) return;
        const oldTask = tasks[index];
        const type = (oldTask && oldTask.type) || 'training';
        tasks[index] = generateHeavenTask(type);
        saveGameState();
    } catch (e) {
        console.warn('替換天命挑戰任務失敗', e);
    }
}

// 刷新天命挑戰任務：將該任務設置為冷卻狀態並重置進度，待時間到自動更新
function refreshHeavenChallenge(index) {
    try {
        initHeavenChallenges();
        const tasks = gameState.heavenChallenges || [];
        if (index < 0 || index >= tasks.length) return;
        const task = tasks[index];
        // 設定冷卻 10 分鐘
        const cooldownMs = 10 * 60 * 1000;
        const now = Date.now();
        // 重置任務狀態（取消接受、未完成、未領獎）
        task.accepted = false;
        task.completed = false;
        task.claimed = false;
        task.cooldownUntil = now + cooldownMs;
        // 清空進度
        if (task.subType === 'sessions') {
            task.progress.sessions = 0;
        } else if (task.subType === 'correct') {
            task.progress.correct = 0;
        } else if (task.subType === 'streak') {
            task.progress.streak = 0;
        } else if (task.type === 'item') {
            task.progress.uses = 0;
        } else if (task.type === 'achievement') {
            if (task.subType === 'exp') task.progress.exp = 0;
            if (task.subType === 'streak') task.progress.streak = 0;
        }
        saveGameState();
        showHeavenChallenges();
    } catch (e) {
        console.warn('刷新天命挑戰失敗', e);
    }
}

// 顯示天命挑戰任務列表
function showHeavenChallenges() {
    try {
        // 初始化並清理任務，再展示清單
        initHeavenChallenges();
        cleanupHeavenChallenges();
        const tasks = gameState.heavenChallenges || [];
        let html = '';
        if (!tasks || tasks.length === 0) {
            html = '<p>目前沒有任何天命挑戰任務。</p>';
        } else {
            html = '<ul style="list-style:none; padding-left:0;">';
            const now = Date.now();
            // 將已接受且未領獎的任務置頂顯示
            const displayTasks = tasks.map((t,i) => ({task: t, index: i})).sort((a,b) => {
                const aAccepted = a.task && a.task.accepted && !a.task.claimed;
                const bAccepted = b.task && b.task.accepted && !b.task.claimed;
                if (aAccepted && !bAccepted) return -1;
                if (!aAccepted && bAccepted) return 1;
                return 0;
            });
            displayTasks.forEach(({task, index}) => {
                // 冷卻中：顯示剩餘時間
                if (task.cooldownUntil && now < task.cooldownUntil) {
                    const remainMs = task.cooldownUntil - now;
                    const remainMin = Math.floor(remainMs / 60000);
                    const remainSec = Math.floor((remainMs % 60000) / 1000);
                    html += '<li style="margin-bottom: 12px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; background:#f8f9fa;">';
                    html += `<p>任務刷新中，請稍候 (${remainMin} 分 ${remainSec} 秒)</p>`;
                    html += '</li>';
                    return;
                }
                // 計算進度描述
                let progressText = '';
                if (task.type === 'training') {
                    if (task.subType === 'sessions') {
                        const current = (task.progress && task.progress.sessions) || 0;
                        progressText = `${current} / ${task.targetSessions} 次`;
                    } else if (task.subType === 'correct') {
                        const current = (task.progress && task.progress.correct) || 0;
                        progressText = `${current} / ${task.targetCorrect} 題`;
                    } else if (task.subType === 'streak') {
                        const current = (task.progress && task.progress.streak) || 0;
                        progressText = `${current} / ${task.targetStreak} 連勝`;
                    }
                } else if (task.type === 'trial') {
                    const current = (task.progress && task.progress.sessions) || 0;
                    progressText = `${current} / ${task.targetSessions} 次`;
                } else if (task.type === 'item') {
                    const current = (task.progress && task.progress.uses) || 0;
                    progressText = `${current} / ${task.targetItemUse} 次`;
                } else if (task.type === 'achievement') {
                    if (task.subType === 'exp') {
                        const current = (task.progress && task.progress.exp) || 0;
                        progressText = `${current} / ${task.targetExp} EXP`;
                    } else if (task.subType === 'streak') {
                        const current = (task.progress && task.progress.streak) || 0;
                        progressText = `${current} / ${task.targetStreak} 連勝`;
                    }
                }
                // 計算期限
                let expireLabel = '無期限';
                let remainingLabel = '';
                if (task.durationDays && task.durationDays > 0) {
                    expireLabel = `${task.durationDays} 日`;
                    if (task.expireAt) {
                        const diffMs = task.expireAt - now;
                        if (diffMs > 0) {
                            const diffDays = Math.floor(diffMs / (24 * 3600 * 1000));
                            const diffHours = Math.floor((diffMs % (24 * 3600 * 1000)) / (3600 * 1000));
                            const diffMins = Math.floor((diffMs % (3600 * 1000)) / (60 * 1000));
                            remainingLabel = `剩餘 ${diffDays} 天 ${diffHours} 時 ${diffMins} 分`;
                        } else {
                            remainingLabel = '任務已過期';
                        }
                    }
                }
                // 奖励描述
                const rewardParts = [];
                if (task.reward && task.reward.exp) rewardParts.push(`${task.reward.exp} EXP`);
                if (task.reward && task.reward.stones) rewardParts.push(`${task.reward.stones} 靈石`);
                // 構建元素
                html += '<li style="margin-bottom: 12px; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">';
                html += `<p>${task.description}</p>`;
                html += `<p>進度：${progressText}</p>`;
                html += `<p>期限：${expireLabel}` + (remainingLabel ? `（${remainingLabel}）` : '') + '</p>';
                if (rewardParts.length > 0) {
                    html += `<p>獎勵：${rewardParts.join('、')}</p>`;
                }
                // 顯示刷新按鈕
                html += `<button data-action="refresh-heaven-challenge" data-index="${index}">🔄 刷新</button>`;
                // 按鈕：未接受 -> 接受；接受未完成 -> 放棄；完成未領獎 -> 領取；已領獎 -> 已完成
                if (!task.accepted) {
                    html += `<button data-action="accept-heaven-challenge" data-index="${index}">✅ 接受</button>`;
                } else if (task.accepted && !task.completed) {
                    html += `<button data-action="cancel-heaven-challenge" data-index="${index}">❌ 放棄</button>`;
                } else if (task.accepted && task.completed && !task.claimed) {
                    html += `<button data-action="claim-heaven-challenge" data-index="${index}">🎁 領取獎勵</button>`;
                } else {
                    html += `<span style="color: var(--success-color); font-weight: bold;">已完成</span>`;
                }
                html += '</li>';
            });
            html += '</ul>';
        }
        showModal('🌠 天命挑戰', html, '<button data-action="close-modal">關閉</button>');
    } catch (e) {
        console.warn('顯示天命挑戰失敗', e);
        showModal('🌠 天命挑戰', '<p>無法顯示天命挑戰。</p>', '<button data-action="close-modal">關閉</button>');
    }
}

// 接受天命挑戰任務
function acceptHeavenChallenge(index) {
    try {
        initHeavenChallenges();
        const tasks = gameState.heavenChallenges || [];
        if (index < 0 || index >= tasks.length) return;
        const task = tasks[index];
        // 不可在冷卻或過期時接受
        const nowTime = Date.now();
        if (task.cooldownUntil && nowTime < task.cooldownUntil) return;
        if (task.expireAt && nowTime > task.expireAt) return;
        if (task.accepted) return;
        // 檢查已接受任務數量：基礎上限為 3，每累積 5000 次普通訓練可額外多接受 1 個
        const acceptedCount = tasks.filter(t => t.accepted && !t.claimed).length;
        const baseLimit = 3;
        // 若 gameState.total 尚未定義則視為 0
        const totalTrainings = gameState.total || 0;
        const extra = Math.floor(totalTrainings / 5000);
        const acceptedLimit = baseLimit + extra;
        if (acceptedCount >= acceptedLimit) {
            showModal('🌠 天命挑戰', `<p>你已接受 ${acceptedLimit} 個天命挑戰，完成後才能接受新的任務。</p>`, '<button data-action="close-modal">關閉</button>');
            return;
        }
        task.accepted = true;
        task.progress = task.progress || {};
        // 重置進度
        if (task.subType === 'sessions') {
            task.progress.sessions = 0;
        } else if (task.subType === 'correct') {
            task.progress.correct = 0;
        } else if (task.subType === 'streak') {
            task.progress.streak = 0;
        } else if (task.type === 'item') {
            task.progress.uses = 0;
        } else if (task.type === 'achievement' && task.subType === 'exp') {
            task.progress.exp = 0;
        }
        saveGameState();
        showHeavenChallenges();
    } catch (e) {
        console.warn('接受天命挑戰失敗', e);
    }
}

// 放棄天命挑戰任務
function cancelHeavenChallenge(index) {
    try {
        initHeavenChallenges();
        const tasks = gameState.heavenChallenges || [];
        if (index < 0 || index >= tasks.length) return;
        const task = tasks[index];
        if (!task.accepted || task.claimed) return;
        // 放棄後重置任務狀態及進度
        task.accepted = false;
        task.completed = false;
        task.claimed = false;
        if (task.subType === 'sessions') {
            task.progress.sessions = 0;
        } else if (task.subType === 'correct') {
            task.progress.correct = 0;
        } else if (task.subType === 'streak') {
            task.progress.streak = 0;
        } else if (task.type === 'item') {
            task.progress.uses = 0;
        } else if (task.type === 'achievement' && task.subType === 'exp') {
            task.progress.exp = 0;
        }
        saveGameState();
        showHeavenChallenges();
    } catch (e) {
        console.warn('放棄天命挑戰失敗', e);
    }
}

// 領取天命挑戰獎勵
function claimHeavenChallengeReward(index) {
    try {
        initHeavenChallenges();
        const tasks = gameState.heavenChallenges || [];
        if (index < 0 || index >= tasks.length) return;
        const task = tasks[index];
        if (!task.accepted || !task.completed || task.claimed) return;
        // 發放獎勵
        const rExp = (task.reward && task.reward.exp) || 0;
        const rStones = (task.reward && task.reward.stones) || 0;
        if (rExp > 0) gameState.exp += rExp;
        if (rStones > 0) gameState.stones += rStones;
        task.claimed = true;
        saveGameState();
        // 給予提示
        let rewardMsgParts = [];
        if (rExp > 0) rewardMsgParts.push(`${rExp} 修煉經驗`);
        if (rStones > 0) rewardMsgParts.push(`${rStones} 靈石`);
        const msg = rewardMsgParts.length > 0 ? rewardMsgParts.join('、') : '完成任務，獎勵已發放';
        showModal('🎁 天命挑戰完成', `<p>${msg}</p>`, '<button data-action="close-modal">關閉</button>');
        // 任務領取後，自動產生新任務（保持同類型）
        replaceHeavenTask(index);
        showHeavenChallenges();
    } catch (e) {
        console.warn('領取天命挑戰獎勵失敗', e);
    }
}

// 確認上貢：處理物品與靈石捐贈，計算貢獻並提示
function confirmTribute() {
    try {
        if (!gameState.sectName || gameState.sectName === '') {
            showModal('📦 上貢', '<p>你尚未加入宗門。</p>', '<button data-action="close-modal">關閉</button>');
            return;
        }
        const selectEl = document.getElementById('tributeItemSelect');
        const qtyEl = document.getElementById('tributeItemQty');
        const stoneEl = document.getElementById('tributeStoneQty');
        const itemName = selectEl ? selectEl.value : '';
        const qty = qtyEl ? parseInt(qtyEl.value || '0', 10) : 0;
        const stoneQty = stoneEl ? parseInt(stoneEl.value || '0', 10) : 0;
        let totalContribution = 0;
        let details = '';
        // 處理物品捐贈
        if (itemName) {
            if (!gameState.inventory[itemName] || gameState.inventory[itemName] < qty || qty <= 0) {
                showModal('📦 上貢', '<p>物品數量不足，無法上貢。</p>', '<button data-action="close-modal">關閉</button>');
                return;
            }
            // 計算貢獻值：以物品價格為基礎，乘以數量
            const price = ITEM_STONE_PRICES[itemName] || 1;
            // 讓貢獻值略高於售價，乘以常數 2
            const contribVal = price * 2 * qty;
            totalContribution += contribVal;
            // 扣除物品
            gameState.inventory[itemName] -= qty;
            if (gameState.inventory[itemName] <= 0) delete gameState.inventory[itemName];
            details += `<p>使用 ${itemName} × ${qty}，增加貢獻 ${contribVal}</p>`;
        }
        // 處理靈石捐贈
        if (stoneQty > 0) {
            if ((gameState.stones || 0) < stoneQty) {
                showModal('📦 上貢', '<p>靈石不足，無法捐贈。</p>', '<button data-action="close-modal">關閉</button>');
                return;
            }
            const contribVal = stoneQty; // 1:1
            totalContribution += contribVal;
            gameState.stones -= stoneQty;
            details += `<p>捐贈靈石 ${stoneQty}，增加貢獻 ${contribVal}</p>`;
        }
        if (totalContribution <= 0) {
            showModal('📦 上貢', '<p>請選擇要捐贈的物品或輸入靈石數量。</p>', '<button data-action="close-modal">關閉</button>');
            return;
        }
        // 增加宗門貢獻並同步倉庫
        gameState.sectContribution = (gameState.sectContribution || 0) + totalContribution;
        gameState.sectStorage = (gameState.sectStorage || 0) + totalContribution;
        saveGameState();
        showModal('📦 上貢成功', `${details}<p>總貢獻 +${totalContribution}</p>`, '<button data-action="close-modal">確認</button>');
        // 更新主介面
        renderMainMenu();
    } catch (e) {
        console.warn('上貢失敗', e);
        showModal('📦 上貢', '<p>上貢時發生錯誤。</p>', '<button data-action="close-modal">關閉</button>');
    }
}

// 生成 AI 修士成員列表。根據宗門等級決定成員數量與修為，返回包含 name、stage、power、contribution 的物件陣列。
function generateAISectMembers(level) {
    try {
        const namesPool = ['青松真人','玄劍子','天風道人','紫霞仙子','無塵子','流雲真人','青雲道人','太虛子','紫電真人','白雲劍仙','青蓮仙子','太初道人'];
        const members = [];
        // 成員數量根據等級：最低 5 人，之後每 2 級增加 1 人，上限 30 人
        let count = 5 + Math.floor(level / 2);
        if (count > 30) count = 30;
        for (let i = 0; i < count; i++) {
            const name = namesPool[Math.floor(Math.random() * namesPool.length)] + (i+1);
            // 決定修為階段：依宗門等級選擇適合的修為類別
            const stageIdx = getRandomStageIndexForAISect(level);
            // 取得對應修為名稱，CULTIVATION_STAGES 結構為 [需要經驗, 勝率, 修為名稱]
            const stageName = (CULTIVATION_STAGES[stageIdx] && CULTIVATION_STAGES[stageIdx][2]) || '散修';
            // 決定戰力與每日貢獻：戰力隨等級及修為上限增加；每日貢獻為一定範圍隨機值
            const power = level * 100 + (Math.random() * 2000);
            const dailyContrib = 5 + Math.floor(Math.random() * 50);
            // 記錄修為索引，方便後續排序
            const stageIndexForSort = getStageIndexByName(stageName);
            members.push({ name, stage: stageName, power: Math.round(power), dailyContrib, role: '弟子', stageIdx: stageIndexForSort });
        }
        return members;
    } catch (e) {
        console.warn('生成 AI 成員失敗', e);
        return [];
    }
}

// 生成單一 AI 修士成員，供自動招收與每日事件使用
function generateAISectMember(level) {
    try {
        const namesPool = ['青松真人','玄劍子','天風道人','紫霞仙子','無塵子','流雲真人','青雲道人','太虛子','紫電真人','白雲劍仙','青蓮仙子','太初道人'];
        const name = namesPool[Math.floor(Math.random() * namesPool.length)] + Math.floor(Math.random() * 100);
    // 使用新版 AI 修士修為分布：根據宗門等級隨機決定修為索引
    const stageIdx = getRandomStageIndexForAISect(level);
    const stageName = (CULTIVATION_STAGES[stageIdx] && CULTIVATION_STAGES[stageIdx][2]) || '散修';
    const power = Math.round(level * 100 + (Math.random() * 2000));
    const dailyContrib = 5 + Math.floor(Math.random() * 50);
    // 直接將 stageIdx 作為排序依據，以便後續比較修為高低
    return { name, stage: stageName, power, dailyContrib, role: '弟子', stageIdx };
    } catch (e) {
        console.warn('生成單一 AI 修士失敗', e);
        return { name: '無名修士', stage: '散修', power: 100, dailyContrib: 10, role: '弟子' };
    }
}

// 根據修為名稱取得對應的階段索引，用於排序。返回較大的值代表修為較高。
function getStageIndexByName(stageName) {
    try {
        // 在 CULTIVATION_STAGES 中尋找第一個匹配的修為名稱
        for (let i = CULTIVATION_STAGES.length - 1; i >= 0; i--) {
            if (CULTIVATION_STAGES[i] && CULTIVATION_STAGES[i][2] === stageName) {
                return i;
            }
        }
        return 0;
    } catch (e) {
        return 0;
    }
}

// 根據宗門等級判斷 AI 宗門位階
function getSectRankForAI(level) {
    try {
        if (level >= 50) return '仙門聖地';
        if (level >= 40) return '聖地宗門';
        if (level >= 30) return '名門大宗';
        if (level >= 20) return '一流宗門';
        if (level >= 10) return '二流宗門';
        return '三流宗門';
    } catch (e) {
        return '三流宗門';
    }
}

// 更新宗門位階：依據宗門平均修為與總貢獻自動決定位階名稱
function updateSectRank() {
    try {
        if (!gameState.sectName || gameState.sectName === '') return;
        // 計算玩家修為索引
        const playerStageName = getCultivationStage(gameState.exp);
        let totalIdx = getStageIndexByName(playerStageName);
        let count = 1;
        if (Array.isArray(gameState.sectMembers)) {
            gameState.sectMembers.forEach(m => {
                const idx = (typeof m.stageIdx === 'number') ? m.stageIdx : getStageIndexByName(m.stage);
                totalIdx += idx;
                count++;
            });
        }
        const avgIdx = totalIdx / (count || 1);
        const contrib = gameState.sectContribution || 0;
        let rankName = '三流宗門';
        // 依據貢獻與平均修為設定宗門位階
        if (contrib >= 200000 && avgIdx >= 70) {
            rankName = '仙門聖地';
        } else if (contrib >= 50000 && avgIdx >= 50) {
            rankName = '聖地宗門';
        } else if (contrib >= 20000 && avgIdx >= 30) {
            rankName = '名門大宗';
        } else if (contrib >= 10000 && avgIdx >= 20) {
            rankName = '一流宗門';
        } else if (contrib >= 5000 && avgIdx >= 10) {
            rankName = '二流宗門';
        } else {
            rankName = '三流宗門';
        }
        gameState.sectRankName = rankName;
        saveGameState();
    } catch (e) {
        console.warn('更新宗門位階失敗', e);
    }
}

// 計算宗門總戰力：加總所有成員的 power，再加上玩家的修煉經驗值
function calcSectPower() {
    try {
        let total = 0;
        if (Array.isArray(gameState.sectMembers)) {
            for (const m of gameState.sectMembers) {
                total += m.power || 0;
            }
        }
        // 將玩家經驗也視為戰力之一部分
        total += (gameState.exp || 0);
        return total;
    } catch (e) {
        console.warn('計算宗門戰力失敗', e);
        return 0;
    }
}

// 為宗門增加貢獻：根據修煉所得經驗或其他行為增加宗門貢獻度
function addSectContributionFromTraining(expGain) {
    try {
        if (gameState && gameState.sectName && gameState.sectName !== '') {
            const addVal = Math.max(1, Math.floor(expGain || 0));
            gameState.sectContribution = (gameState.sectContribution || 0) + addVal;
            // 更新宗門位階使其即時反映新增貢獻
            updateSectRank();
        }
    } catch (e) {
        console.warn('增加宗門貢獻失敗', e);
    }
}

// 更新每日宗門貢獻：如果今天尚未計算，則讓 AI 成員提供每日貢獻值並累加至宗門貢獻
function updateSectDailyContribution() {
    try {
        if (!gameState.sectName || gameState.sectName === '') return;
        const today = getTodayDateStr();
        if (gameState.sectLastContributionDate === today) return;
        let added = 0;
        if (Array.isArray(gameState.sectMembers)) {
            // 每個成員累計其每日貢獻，並同時成長戰力、修為與更新每日貢獻
            gameState.sectMembers.forEach(m => {
                // 若不存在 stageIdx，根據修為名稱設定索引，便於後續成長
                if (typeof m.stageIdx !== 'number') {
                    m.stageIdx = getStageIndexByName(m.stage);
                }
                // 累計每日貢獻值
                added += m.dailyContrib || 0;
                // 戰力成長：每天增加 5%
                m.power = Math.round((m.power || 0) * 1.05);
                // 修為成長：30% 機率晉級一層
                if (Math.random() < 0.30) {
                    if (typeof m.stageIdx === 'number' && m.stageIdx < CULTIVATION_STAGES.length - 1) {
                        m.stageIdx += 1;
                        const newStage = CULTIVATION_STAGES[m.stageIdx];
                        if (newStage && newStage[2]) {
                            m.stage = newStage[2];
                        }
                        // 職位晉升：當修為達到化神以上，弟子晉升為長老
                        const sName = m.stage || '';
                        if (m.role === '弟子' && (sName.includes('化神') || sName.includes('煉虛') || sName.includes('合體') || sName.includes('大乘') || sName.includes('渡劫'))) {
                            m.role = '長老';
                        }
                    }
                }
                // 重置下一次的每日貢獻值為 5~50 隨機
                m.dailyContrib = 5 + Math.floor(Math.random() * 50);
            });
            // 自動收徒：若成員數未達上限，招收新的 AI 修士
            const maxMembers = Math.min(30, 5 + Math.floor((gameState.sectLevel || 1) / 2));
            if (gameState.sectMembers.length < maxMembers) {
                const newMember = generateAISectMember(gameState.sectLevel || 1);
                gameState.sectMembers.push(newMember);
            }
            // 宗門每日事件：隨機產生特殊事件
            const rand = Math.random();
            if (rand < 0.2) {
                // 新增成員事件：若尚未達上限，再招收一名修士
                if (gameState.sectMembers.length < maxMembers) {
                    gameState.sectMembers.push(generateAISectMember(gameState.sectLevel || 1));
                }
            } else if (rand < 0.4) {
                // 額外貢獻事件：獲得 100~500 隨機貢獻
                const bonus = 100 + Math.floor(Math.random() * 401);
                added += bonus;
            } else if (rand < 0.6) {
                // 戰力提升事件：所有成員戰力額外增加 10%
                gameState.sectMembers.forEach(m => {
                    m.power = Math.round((m.power || 0) * 1.10);
                });
            }
        }
        gameState.sectContribution = (gameState.sectContribution || 0) + added;
        gameState.sectLastContributionDate = today;
        // 更新宗門位階依據最新貢獻與修為
        updateSectRank();
        saveGameState();
    } catch (e) {
        console.warn('更新宗門貢獻失敗', e);
    }
}

// 顯示宗門成員列表
function showSectMembers() {
    try {
        updateSectDailyContribution();
        let html = '';
        if (!gameState.sectName || gameState.sectName === '') {
            html += '<p>你尚未加入任何宗門。</p>';
        } else {
            const members = gameState.sectMembers || [];
            html += `<p>宗門名稱：${gameState.sectName}</p>`;
            html += `<p>宗門等級：${gameState.sectLevel}</p>`;
            html += `<p>宗門貢獻：${gameState.sectContribution}</p>`;
            html += `<p>宗門總戰力：${calcSectPower()}</p>`;
            html += '<div style="max-height:300px; overflow-y:auto; border:1px solid #ccc; padding:4px;">';
            if (members.length === 0) {
                html += '<p>目前只有你一人。</p>';
            } else {
                html += '<table style="width:100%;"><thead><tr><th>成員</th><th>修為</th><th>戰力</th><th>每日貢獻</th><th>職位</th></tr></thead><tbody>';
                // 將玩家也視為成員，合併後一併排序。依職位（宗主＞長老＞弟子）及修為高低排序
                const combinedMembers = (members.slice());
                const playerStageName = getCultivationStage(gameState.exp);
                const playerObj = {
                    name: '你',
                    stage: playerStageName,
                    power: gameState.exp,
                    dailyContrib: 0,
                    role: gameState.sectRole || '宗主',
                    stageIdx: getStageIndexByName(playerStageName)
                };
                combinedMembers.push(playerObj);
                const roleOrder = { '宗主': 0, '長老': 1, '弟子': 2 };
                const sortedMembers = combinedMembers.sort((a, b) => {
                    const ra = roleOrder[a.role || '弟子'] ?? 2;
                    const rb = roleOrder[b.role || '弟子'] ?? 2;
                    if (ra !== rb) return ra - rb;
                    const sa = (typeof a.stageIdx === 'number') ? a.stageIdx : getStageIndexByName(a.stage);
                    const sb = (typeof b.stageIdx === 'number') ? b.stageIdx : getStageIndexByName(b.stage);
                    return sb - sa;
                });
                sortedMembers.forEach(m => {
                    html += `<tr><td>${m.name}</td><td>${m.stage}</td><td>${m.power}</td><td>${m.dailyContrib || 0}</td><td>${m.role || '弟子'}</td></tr>`;
                });
                html += '</tbody></table>';
            }
            html += '</div>';
        }
        showModal('👥 宗門成員列表', html, '<button data-action="close-modal">關閉</button>');
    } catch (e) {
        console.warn('顯示成員列表失敗', e);
        showModal('👥 宗門成員列表', '<p>無法顯示成員列表。</p>', '<button data-action="close-modal">關閉</button>');
    }
}

// 顯示宗門排行榜：列出所有 AI 宗門及玩家宗門，依戰力排序
function showSectLeaderboard() {
    try {
        updateSectDailyContribution();
        let list = [];
        // AI 宗門
        AI_SECTS.forEach(sect => {
            // AI 宗門戰力基於等級
            const power = sect.level * 1000;
            list.push({ id: sect.id, name: sect.name, level: sect.level, power, contribution: 0 });
        });
        // 玩家宗門
        if (gameState.sectName && gameState.sectName !== '') {
            const id = gameState.sectId;
            const existing = list.find(item => item.id === id);
            const entry = { id: id, name: gameState.sectName, level: gameState.sectLevel, power: calcSectPower(), contribution: gameState.sectContribution };
            if (existing) {
                existing.name = entry.name;
                existing.level = entry.level;
                existing.power = entry.power;
                existing.contribution = entry.contribution;
            } else {
                list.push(entry);
            }
        }
        // 去除重複名稱（防呆）：以 id 為鍵確保唯一
        const unique = {};
        list.forEach(item => {
            unique[item.id] = item;
        });
        list = Object.values(unique);
        // 計算綜合實力分數：等級*1000 + 戰力 + 貢獻
        // 為列表計算綜合實力並加入位階名稱
        list.forEach(item => {
            item.score = (item.level || 1) * 1000 + (item.power || 0) + (item.contribution || 0);
            // 決定位階：玩家宗門使用 gameState.sectRankName，AI 宗門依等級計算
            if (gameState.sectId && item.id === gameState.sectId) {
                // 確保更新最新位階
                updateSectRank();
                item.rankName = gameState.sectRankName || '三流宗門';
            } else {
                item.rankName = getSectRankForAI(item.level || 1);
            }
        });
        // 按綜合實力排序
        list.sort((a, b) => b.score - a.score);
        let html = '<table style="width:100%;"><thead><tr><th>排名</th><th>宗門</th><th>位階</th><th>等級</th><th>戰力</th><th>貢獻</th></tr></thead><tbody>';
        list.forEach((item, idx) => {
            html += `<tr><td>${idx + 1}</td><td>${item.name}</td><td>${item.rankName || ''}</td><td>${item.level}</td><td>${item.power}</td><td>${item.contribution}</td></tr>`;
        });
        html += '</tbody></table>';
        showModal('📜 宗門排行榜', html, '<button data-action="close-modal">關閉</button>');
    } catch (e) {
        console.warn('顯示宗門排行榜失敗', e);
        showModal('📜 宗門排行榜', '<p>無法顯示排行榜。</p>', '<button data-action="close-modal">關閉</button>');
    }
}

// 更新天命挑戰進度（普通訓練）：根據答對題數及勝率更新
function updateHeavenChallengeProgressTraining(difficulty, correctCount, totalRounds, winRate, expGain) {
    // 確保任務生成
    initHeavenChallenges();
    const tasks = gameState.heavenChallenges || [];
    let changed = false;
    tasks.forEach((task) => {
        // 任務必須已接受且未完成；且未過期或冷卻
        if (!task.accepted || task.completed) return;
        const nowTime = Date.now();
        if ((task.cooldownUntil && nowTime < task.cooldownUntil) || (task.expireAt && nowTime > task.expireAt)) {
            return;
        }
        try {
            if (task.type === 'training') {
                if (task.difficulty === difficulty) {
                    if (task.subType === 'sessions') {
                        // 需要達到指定勝率
                        if (winRate >= task.winRate) {
                            task.progress.sessions = (task.progress.sessions || 0) + 1;
                            if (task.progress.sessions >= task.targetSessions) {
                                task.completed = true;
                            }
                            changed = true;
                        }
                    } else if (task.subType === 'correct') {
                        task.progress.correct = (task.progress.correct || 0) + correctCount;
                        if (task.progress.correct >= task.targetCorrect) {
                            task.completed = true;
                        }
                        changed = true;
                    } else if (task.subType === 'streak') {
                        // streak 任務：若本次達標則連續+1，否則歸零
                        if (winRate >= task.winRate) {
                            task.progress.streak = (task.progress.streak || 0) + 1;
                        } else {
                            task.progress.streak = 0;
                        }
                        if (task.progress.streak >= task.targetStreak) {
                            task.completed = true;
                        }
                        changed = true;
                    }
                }
            }
            if (task.type === 'achievement') {
                if (task.subType === 'exp') {
                    // 累積經驗任務
                    task.progress.exp = (task.progress.exp || 0) + (expGain || 0);
                    if (task.progress.exp >= task.targetExp) {
                        task.completed = true;
                    }
                    changed = true;
                } else if (task.subType === 'streak' && task.difficulty === difficulty) {
                    // 成就類連勝任務：與 training streak 方式相同
                    if (winRate >= task.winRate) {
                        task.progress.streak = (task.progress.streak || 0) + 1;
                    } else {
                        task.progress.streak = 0;
                    }
                    if (task.progress.streak >= task.targetStreak) {
                        task.completed = true;
                    }
                    changed = true;
                }
            }
        } catch (e) { console.warn('更新天命挑戰進度（訓練）失敗', e); }
    });
    if (changed) saveGameState();
}

<!-- 音效與箭頭後援程式：在行動裝置上顯示箭頭，並生成音效（無需外部音檔） -->
<script>
// ==== 行動裝置箭頭 SVG 後援 ====
function svgArrow(dir, size = 18) {
    const pathMap = {
        up:   'M9 2 L16 14 H2 Z',
        right:'M2 2 L14 9 L2 16 Z',
        down: 'M2 2 L16 2 L9 16 Z',
        left: 'M2 9 L14 2 L14 16 Z'
    };
    const key = pathMap[dir] ? dir : 'up';
    const svg = `<svg viewBox="0 0 18 18" width="${size}" height="${size}" aria-hidden="true" style="display:inline-block;vertical-align:middle"><path d="${pathMap[key]}" fill="currentColor"/></svg>`;
    const el = document.createElement('span');
    el.className = 'luck-arrow-svg';
    el.innerHTML = svg;
    return el;
}

// 將含有箭頭字元或指定 data 屬性的節點替換為 SVG
function patchLuckArrows() {
    const selector = '.luck-arrow, [data-luck-arrow], [data-dir]';
    document.querySelectorAll(selector).forEach(node => {
        // 已經有 SVG 就不重複替換
        if (node.querySelector('svg')) return;
        // 判斷方向
        let dir = node.dataset.luckArrow || node.dataset.dir || '';
        // 若未指定，根據內容判斷
        if (!dir) {
            const text = node.textContent.trim();
            const map = {'↑': 'up', '→': 'right', '↓': 'down', '←': 'left'};
            dir = map[text] || 'up';
        }
        // 清空文字並插入 SVG
        node.textContent = '';
        node.appendChild(svgArrow(dir));
    });
}

// ==== WebAudio 音效工具 ====
let __audioCtx = null;
function ensureAudio() {
    if (!__audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        __audioCtx = new Ctx();
    }
    return __audioCtx;
}

function playBeep(opts) {
    const cfg = Object.assign({ freq: 880, dur: 0.12, type: 'sine', gain: 0.06 }, opts);
    const ctx = ensureAudio();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.type = cfg.type;
    osc.frequency.value = cfg.freq;
    gainNode.gain.value = cfg.gain;
    osc.connect(gainNode).connect(ctx.destination);
    const t = ctx.currentTime;
    osc.start(t);
    osc.stop(t + cfg.dur);
}

function playLevelUp() {
    const ctx = ensureAudio();
    if (!ctx) return;
    const now = ctx.currentTime;
    // 上行小和弦：C-E-G 依序響起
    [[523.25, 0], [659.25, 0.08], [783.99, 0.16]].forEach(([freq, offset]) => {
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gainNode.gain.value = 0.05;
        osc.connect(gainNode).connect(ctx.destination);
        osc.start(now + offset);
        osc.stop(now + offset + 0.18);
    });
}

// ==== 獎勵音效：模擬樂透中獎音效，播放一連串漸高的 beep 音 ====
function playRewardSound() {
    try {
        // 確保音效系統初始化
        ensureAudio();
        // 連續播放三個頻率的 beep，形成簡單的中獎音效
        playBeep({ freq: 880, dur: 0.14, type: 'square', gain: 0.08 });
        setTimeout(() => playBeep({ freq: 1046.5, dur: 0.14, type: 'square', gain: 0.07 }), 160);
        setTimeout(() => playBeep({ freq: 1318.5, dur: 0.14, type: 'square', gain: 0.06 }), 320);
    } catch (e) {
        console.warn('playRewardSound failed', e);
    }
}

// ==== 初始化與事件綁定 ====
window.addEventListener('DOMContentLoaded', () => {
    try {
        patchLuckArrows();
    } catch (e) {}
});
</script>

function ensureSignedIn() {
  return new Promise(function(resolve) {
    if (!FIREBASE_ONLINE_ENABLED || !auth) return resolve(null);  // # 雲端關閉時直接略過
    var off = auth.onAuthStateChanged(async function(u) {

      catch (e) { off(); resolve(null); }

}

}

// # 雲端資料模型與寫入
async function saveRunRecord(rec) {
  // # rec: { level, score, mode, usedItems, durationSec, result, publishToLeaderboard }
  if (!FIREBASE_ONLINE_ENABLED || !db) return; // # 未啟用則略過
  var u = auth && auth.currentUser ? auth.currentUser : await ensureSignedIn();
  if (!u) return; // # 無法登入則略過
  var uid = u.uid;
  var now = firebase.firestore.Timestamp.now();
  var runRef = db.collection('users').doc(uid).collection('runs').doc(); // # 自動 runId
  var statRef = db.collection('user_stats').doc(uid);

  return db.runTransaction(async function(tx) {
    tx.set(runRef, Object.assign({}, rec, {
      createdAt: now,
      clientAt: new Date().toISOString(),
      appVersion: 'web-1.0.0'
    }));
    var statSnap = await tx.get(statRef);
    var prev = statSnap.exists ? statSnap.data() : { totalRuns: 0, bestScore: -1 };
    var next = {
      totalRuns: (prev.totalRuns || 0) + 1,
      bestScore: Math.max(prev.bestScore || -1, rec.score || 0),
      lastPlayedAt: now
    };
    tx.set(statRef, next, { merge: true });
  }).then(async function() {
    if (rec.publishToLeaderboard) {
      var prof = await getOrInitUserProfile();
      await db.collection('leaderboard_public').doc(uid).set({
        bestScore: rec.score,
        displayName: prof.displayName || '無名修士',
        country: prof.country || 'TW',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }
  }).catch(function(e){ console.warn('saveRunRecord 失敗：', e); });
}

// # 讀取我的資料（可在 UI 上顯示用）
async function loadMyRecentRuns(limitN) {
  if (!FIREBASE_ONLINE_ENABLED || !db) return [];
  var u = auth && auth.currentUser ? auth.currentUser : await ensureSignedIn();
  if (!u) return [];
  var qs = await db.collection('users').doc(u.uid).collection('runs').orderBy('createdAt','desc').limit(limitN||50).get();
  return qs.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
}

async function loadMyStats() {
  if (!FIREBASE_ONLINE_ENABLED || !db) return { totalRuns: 0, bestScore: 0 };
  var u = auth && auth.currentUser ? auth.currentUser : await ensureSignedIn();
  if (!u) return { totalRuns: 0, bestScore: 0 };
  var doc = await db.collection('user_stats').doc(u.uid).get();
  return doc.exists ? doc.data() : { totalRuns: 0, bestScore: 0 };
}

async function loadLeaderboardTopN(n) {
  if (!FIREBASE_ONLINE_ENABLED || !db) return [];
  var qs = await db.collection('leaderboard_public').orderBy('bestScore','desc').limit(n||100).get();
  return qs.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
}

// # 使用者 profile 檔案
async function getOrInitUserProfile() {
  if (!FIREBASE_ONLINE_ENABLED || !db) return { displayName: '無名修士', country: 'TW' };
  var u = auth && auth.currentUser ? auth.currentUser : await ensureSignedIn();
  if (!u) return { displayName: '無名修士', country: 'TW' };
  var ref = db.collection('users').doc(u.uid);
  var snap = await ref.get();
  if (snap.exists) return snap.data();
  var init = { displayName: u.displayName || '無名修士', createdAt: firebase.firestore.FieldValue.serverTimestamp(), avatarUrl: null, country: 'TW' };
  await ref.set(init, { merge: true });
  return init;
}
